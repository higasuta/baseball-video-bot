name: Baseball Video Bot Runner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '比率を無視して投稿する場合は true と入力'
        required: false
        default: 'false'

permissions:
  contents: write # 履歴ファイルを保存するために必須

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true # Git pushを安定させる設定

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot script
        env:
          INSTA_BUSINESS_ID: ${{ secrets.INSTA_BUSINESS_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TEST_MODE: ${{ github.event.inputs.test_mode }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main # 他の実行と競合しないよう最新を取り込む
          git add history.txt stats.json
          git commit -m "Update post history and stats [skip ci]" || exit 0
          git push origin main
