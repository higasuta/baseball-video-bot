name: Baseball Video Bot Runner

on:
  schedule:
    # 15分おきに自動実行
    - cron: '*/15 * * * *'
  workflow_dispatch: # これで手動実行ボタンが出ます

# GitHubのリポジトリにファイルを書き戻す（pushする）ための権限設定
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot script
        env:
          INSTA_BUSINESS_ID: ${{ secrets.INSTA_BUSINESS_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit history and stats
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # history.txtとstats.jsonが存在する場合のみ追加して保存する
          git add history.txt stats.json || true
          git commit -m "Update history and stats" || true
          git push
