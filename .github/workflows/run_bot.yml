name: Baseball Video Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Set to true for testing'
        default: 'false'
        required: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp
          pip install -r requirements.txt

      - name: Run bot
        env:
          INSTA_BUSINESS_ID: ${{ secrets.INSTA_BUSINESS_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TEST_MODE: ${{ github.event.inputs.test_mode }}
        run: python main.py

      - name: Commit changes
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add history.txt stats.json
          git commit -m "Update post history and stats [skip ci]" || echo "No changes to commit"
          git push
